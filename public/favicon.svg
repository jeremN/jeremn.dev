<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- A 2x2 LEGO plate, one stud lit: the Brick Milky Way, reduced to a single star. -->
  <defs>
    <filter id="lit" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#15131f" />
  <rect x="6" y="6" width="52" height="52" rx="9" fill="#2a2536" />
  <g fill="#383247" stroke="#221e2e">
    <circle cx="19" cy="19" r="9" />
    <circle cx="19" cy="45" r="9" />
    <circle cx="45" cy="45" r="9" />
  </g>
  <circle cx="45" cy="19" r="9" fill="#7ee0c8" filter="url(#lit)" />
</svg>
