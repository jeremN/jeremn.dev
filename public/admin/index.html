<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager · jeremn.dev</title>
    <style>
      /* Boot state. The bundle is ~1.8 MB and takes a moment to parse and mount,
         during which the page is otherwise blank — which reads as "broken" rather
         than "loading". Removed as soon as the CMS paints. */
      body {
        margin: 0;
        background: #0b0a12;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-content: center;
        justify-items: center;
        gap: 1.25rem;
        color: #8b8898;
        font: 400 0.8125rem/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      #boot::before {
        content: '';
        width: 1.5rem;
        height: 1.5rem;
        border: 2px solid #2a2733;
        border-top-color: #ffd34d;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot">Loading the editor</div>

    <!--
      Sveltia CMS — self-hosted, not loaded from a CDN. Serving it from our own
      origin means a CDN outage can't take the CMS down (SRI protects integrity,
      but not availability). The integrity hash is kept anyway: it pins this file
      to the exact upstream release and catches a corrupted vendored copy.

      To upgrade, replace the file and recompute the hash — update BOTH together:
        curl -sL https://unpkg.com/@sveltia/cms@<version>/dist/sveltia-cms.js \
          -o public/admin/sveltia-cms.js
        openssl dgst -sha384 -binary < public/admin/sveltia-cms.js | openssl base64 -A

      Pinned: @sveltia/cms@0.167.3. See docs/blog-authoring.md.
      config.yml is auto-discovered from this folder.
    -->
    <script
      src="./sveltia-cms.js"
      integrity="sha384-DX22AUN63JgB03kV9ws5yc1Y+4BGEnuS4ReIZARbhovo2KWjGUXMw6M3LXMmZB3v"
    ></script>

    <script>
      // Drop the boot state once the CMS puts anything of its own on the page.
      // Watching for real content beats a fixed timeout, which would either
      // flash early or linger after the app is already interactive.
      (() => {
        const boot = document.getElementById('boot')
        if (!boot) return

        const done = () => {
          boot.remove()
          observer.disconnect()
        }

        const observer = new MutationObserver(() => {
          const mounted = [...document.body.children].some(
            (el) => el !== boot && el.tagName !== 'SCRIPT',
          )
          if (mounted) done()
        })

        observer.observe(document.body, { childList: true })
        // Backstop: never trap the user behind a spinner if the app fails to mount.
        setTimeout(done, 15000)
      })()
    </script>
  </body>
</html>
